name: Deployment

on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deployment-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    steps:
      # DEPLOY_SSH_KEY on VPS: base64 -w0 < ~/.ssh/github_actions  (one line, no spaces)
      - name: Deploy to server via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
        run: |
          set -euo pipefail

          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::Secret DEPLOY_SSH_KEY is empty."
            exit 1
          fi

          deploy_key="$RUNNER_TEMP/deploy_key"

          if printf '%s' "$SSH_PRIVATE_KEY" | grep -q 'BEGIN.*PRIVATE KEY'; then
            printf '%s\n' "$SSH_PRIVATE_KEY" | sed 's/\r$//' > "$deploy_key"
          else
            if ! printf '%s' "$SSH_PRIVATE_KEY" | tr -d '\n\r\t ' | openssl base64 -d -A > "$deploy_key" 2>/dev/null; then
              echo "::error::DEPLOY_SSH_KEY must be a raw private key or valid base64 of that key."
              exit 1
            fi
          fi

          chmod 600 "$deploy_key"

          if ! ssh-keygen -y -f "$deploy_key" > /dev/null 2>&1; then
            echo "::error::DEPLOY_SSH_KEY is not a valid SSH private key."
            exit 1
          fi

          echo "Deploy key fingerprint (check server's authorized_keys):"
          ssh-keygen -lf "$deploy_key"

          mkdir -p ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i "$deploy_key" -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" bash -s <<REMOTE_SCRIPT
          set -euo pipefail
          cd "${DEPLOY_PATH}"
          git fetch origin
          git checkout "${DEPLOY_BRANCH}"
          git pull --ff-only origin "${DEPLOY_BRANCH}"
          composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader
          php artisan migrate --force
          php artisan optimize:clear
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          npm ci --ignore-scripts
          npm run build
          REMOTE_SCRIPT
