name: Deployment

on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deployment-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    steps:
      - name: Configure SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::Secret DEPLOY_SSH_KEY is empty. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi

          mkdir -p ~/.ssh
          deploy_key=~/.ssh/deploy_key

          write_plain_key() {
            printf '%s\n' "$SSH_PRIVATE_KEY" > "$deploy_key"
          }

          write_base64_key() {
            local b64
            b64="$(printf '%s' "$SSH_PRIVATE_KEY" | tr -d '\n\r\t ')"
            while [ $(( ${#b64} % 4 )) -ne 0 ]; do
              b64="${b64}="
            done

            if printf '%s' "$b64" | base64 --ignore-garbage -d > "$deploy_key" 2>/dev/null; then
              return 0
            fi

            echo "::error::DEPLOY_SSH_KEY is not valid base64. Re-create the secret (see workflow comments) or paste the raw private key with BEGIN/END lines."
            return 1
          }

          if printf '%s' "$SSH_PRIVATE_KEY" | grep -q 'BEGIN.*PRIVATE KEY'; then
            write_plain_key
          else
            write_base64_key || exit 1
          fi

          chmod 600 "$deploy_key"

          if ! ssh-keygen -y -f "$deploy_key" > /dev/null 2>&1; then
            echo "::error::Decoded DEPLOY_SSH_KEY is not a valid SSH private key. Encode the private file (not .pub): base64 -w0 private_key"
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key_path: ~/.ssh/deploy_key
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name }}"
            git fetch origin
            git checkout "$BRANCH"
            git pull --ff-only origin "$BRANCH"
            composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader
            php artisan migrate --force
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            npm ci --ignore-scripts
            npm run build
