services:
    app:
        build:
            context: .
            dockerfile: _docker/Dockerfile
            args:
                - USER_ID=1000
                - GROUP_ID=1000
        container_name: app
        volumes:
            - .:/var/www
        depends_on:
            - database
        networks:
            - laravel-network
        restart: unless-stopped

    nginx:
        image: nginx:alpine
        container_name: nginx
        restart: unless-stopped
        ports:
            - "80:80"
        volumes:
            - .:/var/www
            - ./_docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - app
        networks:
            - laravel-network

    database:
        image: postgres:15-alpine
        container_name: database
        ports:
            - "15432:5432"
        environment:
            - POSTGRES_DB=${DB_DATABASE}
            - POSTGRES_USER=${DB_USERNAME}
            - POSTGRES_PASSWORD=${DB_PASSWORD}
        volumes:
            - pg-data:/var/lib/postgresql/data
        restart: unless-stopped
        networks:
            - laravel-network

networks:
    laravel-network:
        driver: bridge

volumes:
    pg-data:
        driver: local
