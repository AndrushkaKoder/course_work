services:
    app:
        build:
            context: .
            dockerfile: _docker/Dockerfile
            args:
                - USER_ID=1000
                - GROUP_ID=1000
        container_name: app
        volumes:
            - .:/var/www
            - ./_docker/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
            - ./_docker/supervisor/supervisord.conf:/etc/supervisor/supervisord.conf:ro
            - ./_docker/supervisor/queue.conf:/etc/supervisor/conf.d/queue.conf:ro
        depends_on:
            - database
            - redis
        environment:
            REDIS_HOST: redis
        networks:
            - laravel-network
        restart: unless-stopped

    nginx:
        image: nginx:alpine
        container_name: nginx
        restart: unless-stopped
        ports:
            - "8080:80"
        volumes:
            - .:/var/www
            - ./_docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - app
        networks:
            - laravel-network

    redis:
        image: redis:7-alpine
        container_name: redis
        restart: unless-stopped
        networks:
            - laravel-network
        deploy:
            resources:
                limits:
                    memory: 256M
                reservations:
                    memory: 256M

    database:
        image: postgres:15-alpine
        container_name: database
        ports:
            - "15432:5432"
        environment:
            - POSTGRES_DB=${DB_DATABASE}
            - POSTGRES_USER=${DB_USERNAME}
            - POSTGRES_PASSWORD=${DB_PASSWORD}
        volumes:
            - pg-data:/var/lib/postgresql/data
        restart: unless-stopped
        networks:
            - laravel-network

    database_test:
        image: postgres:15-alpine
        container_name: database_test
        ports:
            - "25432:5432"
        environment:
            - POSTGRES_DB=${DB_DATABASE}
            - POSTGRES_USER=${DB_USERNAME}
            - POSTGRES_PASSWORD=${DB_PASSWORD}
        tmpfs:
            - /var/lib/postgresql/data
        restart: unless-stopped
        networks:
            - laravel-network
networks:
    laravel-network:
        driver: bridge

volumes:
    pg-data:
        driver: local
